name: CI Pipeline

on:
  push:
    branches:
      - main
      - 'feature/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout du code
      - name: Checkout code
        uses: actions/checkout@v4

      # Java 8
      - name: Set up JDK 8
        uses: actions/setup-java@v2
        with:
          java-version: '8'
          distribution: 'adopt'

      # Build Maven
      - name: Build with Maven
        run: mvn --batch-mode --update-snapshots package

      # Publish tests
      - name: Publish Unit Test Results
        uses: EnricoMi/publish-unit-test-result-action@v1
        if: always()
        with:
          files: target/**/*.xml

      # Upload artifact
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-1.0
          path: target/*

      # Docker install
      - name: Install Docker
        uses: docker/setup-buildx-action@v1
        with:
          install: true

      # Docker build
      - name: Docker build
        run: docker build .
